<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>ISTQB Master Prep (v1) — CTFL v4.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#08090a;
      --panel:#0f1011;
      --surface:#191a1b;
      --card:rgba(255,255,255,.02);
      --card2:rgba(255,255,255,.04);
      --text:#f7f8f8;
      --muted:#d0d6e0;
      --muted2:#8a8f98;
      --subtle:#62666d;
      --border:rgba(255,255,255,.08);
      --border2:rgba(255,255,255,.05);
      --brand:#5e6ad2;
      --brand2:#7170ff;
      --ok:#34d399;
      --warn:#fbbf24;
      --bad:#f87171;
      --ring:rgba(94,106,210,.22);
      --radius-micro:2px;
      --radius-std:6px;
      --radius-card:8px;
      --shadow: rgba(0,0,0,.35) 0px 12px 32px;
      --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
      --sans:'Inter', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--sans);
      background:var(--bg);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      letter-spacing:-0.01em;
    }
    a{color:inherit}
    button, input, select{font:inherit}
    .app{display:flex;min-height:100vh}

    /* Sidebar */
    .sidebar{
      width:280px;
      background:var(--panel);
      border-right:1px solid var(--border2);
      padding:16px;
      position:sticky;top:0;align-self:flex-start;
      height:100vh;
      overflow:auto;
    }
    .brandRow{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .logo{
      width:40px;height:40px;border-radius:999px;
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      display:grid;place-items:center;font-weight:600;
    }
    .brandTitle{font-weight:600}
    .small{font-size:12px;color:var(--muted2)}

    .navGroup{margin-top:16px}
    .navTitle{font-size:12px;color:var(--subtle);letter-spacing:.08em;text-transform:uppercase;margin:10px 4px}
    .navBtn{
      width:100%;
      text-align:left;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid transparent;
      background:transparent;
      color:var(--muted2);
      cursor:pointer;
      margin-bottom:8px;
    }
    .navBtn:hover{background:rgba(255,255,255,.03);color:var(--text)}
    .navBtn.active{background:rgba(94,106,210,.14);border-color:rgba(94,106,210,.22);color:var(--text)}
    .navBtn[disabled]{opacity:.5;cursor:not-allowed}

    .pill{
      display:inline-flex;align-items:center;gap:6px;
      padding:2px 10px;border-radius:999px;
      border:1px solid var(--border2);
      color:var(--muted2);
      background:rgba(255,255,255,.02);
      font-size:12px;
      font-weight:500;
      white-space:nowrap;
    }
    .pill.brand{border-color:rgba(94,106,210,.35);background:rgba(94,106,210,.12);color:var(--brand2)}
    .pill.ok{border-color:rgba(52,211,153,.35);background:rgba(52,211,153,.10);color:var(--ok)}
    .pill.bad{border-color:rgba(248,113,113,.35);background:rgba(248,113,113,.10);color:var(--bad)}

    /* Main */
    .main{flex:1;padding:22px;max-width:1100px;margin:0 auto;}
    .topBar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;position:sticky;top:0;background:linear-gradient(to bottom, rgba(8,9,10,.92), rgba(8,9,10,.65));backdrop-filter:blur(10px);padding:12px 0;z-index:5}
    .h1{font-size:26px;font-weight:650;letter-spacing:-.02em}
    .sub{color:var(--muted2);font-size:14px;margin-top:4px}

    .card{
      background:var(--card);
      border:1px solid var(--border2);
      border-radius:16px;
      padding:16px;
    }
    .card.hard{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.07)}

    .grid{display:grid;gap:12px}
    .grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}

    @media (max-width: 980px){
      .sidebar{display:none}
      .main{padding:16px}
      .grid.cols-4{grid-template-columns:repeat(2,minmax(0,1fr))}
      .grid.cols-3{grid-template-columns:repeat(2,minmax(0,1fr))}
      .grid.cols-2{grid-template-columns:1fr}
    }

    /* Buttons */
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:10px;
      padding:10px 14px;
      border-radius:12px;
      border:1px solid var(--border2);
      background:rgba(255,255,255,.02);
      color:var(--muted);
      cursor:pointer;
      transition:transform .08s ease, background .15s ease, border-color .15s ease;
      user-select:none;
    }
    .btn:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12);color:var(--text)}
    .btn:active{transform:scale(.99)}
    .btn.primary{background:rgba(94,106,210,.18);border-color:rgba(94,106,210,.35);color:var(--text)}
    .btn.primary:hover{background:rgba(94,106,210,.26)}
    .btn.danger{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.35);color:var(--text)}
    .btn.ok{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.35);color:var(--text)}
    .btn.ghost{background:transparent}
    .btn.small{padding:8px 10px;font-size:13px;border-radius:10px}

    .select, .input{
      width:100%;
      background:rgba(255,255,255,.02);
      border:1px solid var(--border2);
      border-radius:12px;
      padding:10px 12px;
      color:var(--text);
      outline:none;
    }
    .select:focus, .input:focus{box-shadow:0 0 0 3px var(--ring);border-color:rgba(94,106,210,.55)}

    /* Quiz */
    .qHeader{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:10px}
    .qMeta{display:flex;gap:8px;flex-wrap:wrap}
    .qText{font-size:16px;font-weight:550;line-height:1.4;letter-spacing:-.01em}
    .options{display:flex;flex-direction:column;gap:10px;margin-top:14px}
    .opt{
      text-align:left;
      width:100%;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid var(--border2);
      background:rgba(255,255,255,.01);
      color:var(--muted);
      cursor:pointer;
      transition:background .15s ease, border-color .15s ease;
      display:flex;align-items:flex-start;gap:12px;
    }
    .opt:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12)}
    .opt .k{
      width:28px;height:28px;border-radius:999px;
      border:1px solid var(--border2);
      display:grid;place-items:center;
      font-family:var(--mono);
      font-size:12px;color:var(--muted2);
      flex-shrink:0;
      margin-top:1px;
    }
    .opt.selected{border-color:rgba(94,106,210,.55);background:rgba(94,106,210,.10)}
    .opt.selected .k{border-color:rgba(94,106,210,.55);color:var(--brand2)}

    .opt.correct{border-color:rgba(52,211,153,.55);background:rgba(52,211,153,.10)}
    .opt.incorrect{border-color:rgba(248,113,113,.55);background:rgba(248,113,113,.10)}

    .explain{
      margin-top:14px;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid var(--border2);
      background:rgba(255,255,255,.02);
      color:var(--muted);
      line-height:1.55;
      font-size:14px;
    }

    /* Progress */
    .bar{height:10px;background:rgba(255,255,255,.05);border-radius:999px;overflow:hidden}
    .bar>div{height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));width:0%}

    /* Timer */
    .timer{font-family:var(--mono);font-size:13px;color:var(--muted);background:rgba(255,255,255,.02);border:1px solid var(--border2);padding:8px 10px;border-radius:12px}

    /* Table-free lists */
    .list{display:flex;flex-direction:column;gap:10px}
    .row{display:flex;gap:12px;align-items:flex-start;justify-content:space-between}
    .row .left{min-width:0}
    .row .right{flex-shrink:0;color:var(--muted2);font-family:var(--mono);font-size:13px}

    /* Footer */
    .footerNote{color:var(--muted2);font-size:12px;margin-top:18px;line-height:1.4}

  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brandRow">
      <div class="logo">IST</div>
      <div>
        <div class="brandTitle" style="font-size:16px;font-weight:650;">ISTQB Master Prep</div>
        <div class="small">CTFL v4.0 · Foundation</div>
      </div>
    </div>

    <div class="navGroup">
      <div class="navTitle">Menu</div>
      <button class="navBtn" id="nav-dashboard" data-view="dashboard">Dashboard</button>
      <button class="navBtn" id="nav-modules" data-view="modules">Parcours & Modules</button>
      <button class="navBtn" id="nav-practice" data-view="practice">Entraînement</button>
      <button class="navBtn" id="nav-mock" data-view="mock">Examen Blanc (Timé)</button>
      <button class="navBtn" id="nav-review" data-view="review">Revue des erreurs</button>
      <button class="navBtn" id="nav-progress" data-view="progress">Progression & Stats</button>
      <button class="navBtn" id="nav-settings" data-view="settings">Réglages</button>
    </div>

    <div class="navGroup">
      <div class="navTitle">Chapitres</div>
      <div class="list" id="chapterList"></div>
    </div>

    <div class="footerNote">
      Données sauvegardées en local (localStorage).<br/>
      Export/Import disponible dans Réglages.
    </div>
  </aside>

  <main class="main">
    <div class="topBar">
      <div>
        <div class="h1" id="pageTitle">Dashboard</div>
        <div class="sub" id="pageSub">Votre entraînement ISTQB — ultra structuré.</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
        <div class="timer" id="streakBox">🔥 0 day streak</div>
        <button class="btn small ghost" id="btnResetSession">Reset démo</button>
      </div>
    </div>

    <div id="view" class="grid" style="gap:14px"></div>

  </main>
</div>

<script type="module" src="./app.js?v=4"></script>
</body>
</html>
